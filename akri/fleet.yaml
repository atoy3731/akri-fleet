defaultNamespace: akri

labels:
  app: akri

helm:
  repo: https://project-akri.github.io/akri
  chart: akri
  version: 0.12.20
  releaseName: akri
  valuesFiles:
  - values.yaml

diff:
  comparePatches:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    name: akri-agent-binding
    operations:
    - {"op": "remove", "path": "/roleRef/apiGroup"}
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    name: akri-controller-binding
    operations:
    - {"op": "remove", "path": "/roleRef/apiGroup"}
